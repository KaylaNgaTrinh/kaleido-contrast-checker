<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kaleido Contrast Checker</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}

/* PAGE */
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a202c;}
body.dark{background:#0f1118;}
.page-wrap{max-width:960px;margin:40px auto;padding:0 24px 80px;}
.page-title{font-size:22px;font-weight:700;color:#1a202c;margin-bottom:4px;}
.page-sub{font-size:14px;color:#718096;margin-bottom:28px;}
body.dark .page-title{color:#f7fafc;}
body.dark .page-sub{color:#a0aec0;}

/* EMBED MODE */
body.embed-mode{background:#fff;}
body.dark.embed-mode{background:#1a1a2e;}
body.embed-mode .page-wrap{max-width:100%;margin:0;padding:0;}
body.embed-mode .page-title,
body.embed-mode .page-sub { display: none; }
body.embed-mode #kce{border-radius:0;border-left:none;border-right:none;border-top:none;}
  
/* SHELL */  
#kce{background:#fff;border:1px solid #e2e8f0;border-radius:16px;overflow:visible;}
body.dark #kce{background:#1a1a2e;border-color:rgba(255,255,255,.08);}

/* HEADER */
.kce-header{
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 20px;border-bottom:1px solid #e2e8f0;gap:10px;
  border-radius:16px 16px 0 0;background:#fff;
  position:sticky;top:0;z-index:20;flex-wrap:wrap;
}
body.dark .kce-header{background:#1a1a2e;border-color:rgba(255,255,255,.08);}
.kce-header-left{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.kce-header-right{display:flex;align-items:center;gap:6px;flex-shrink:0;}

/* DROPDOWN */
.kce-dd{position:relative;}
.kce-dd-btn{
  display:flex;align-items:center;gap:7px;padding:7px 13px;
  border:1px solid #e2e8f0;border-radius:99px;background:#f7f8fa;
  font-size:13px;font-weight:500;color:#2d3748;cursor:pointer;
  transition:border-color .15s,box-shadow .15s;white-space:nowrap;font-family:inherit;
}
.kce-dd-btn:hover{border-color:#a0aec0;box-shadow:0 1px 4px rgba(0,0,0,.07);}
body.dark .kce-dd-btn{background:#232338;border-color:rgba(255,255,255,.1);color:#e2e8f0;}
.kce-brand-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}
.kce-dd-btn svg{width:13px;height:13px;opacity:.5;flex-shrink:0;}
.kce-dd-menu{
  position:absolute;top:calc(100% + 6px);left:0;min-width:max-content;
  background:#fff;border:1px solid #e2e8f0;border-radius:12px;
  box-shadow:0 8px 24px rgba(0,0,0,.12);z-index:100;overflow:hidden;display:none;
}
.kce-dd-menu.open{display:block;}
body.dark .kce-dd-menu{background:#232338;border-color:rgba(255,255,255,.1);box-shadow:0 8px 24px rgba(0,0,0,.4);}
.kce-dd-menu button{
  display:flex;align-items:center;gap:10px;width:100%;padding:10px 16px;
  border:none;background:none;text-align:left;font-size:13px;color:#2d3748;
  cursor:pointer;transition:background .1s;white-space:nowrap;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.kce-dd-menu button:hover{background:#f7f8fa;}
body.dark .kce-dd-menu button{color:#e2e8f0;}
body.dark .kce-dd-menu button:hover{background:rgba(255,255,255,.06);}
.kce-dd-menu button.kce-active{font-weight:700;}
.b-dot{width:9px;height:9px;border-radius:50%;border:1.5px solid rgba(0,0,0,.15);flex-shrink:0;}

/* MODE TOGGLE */
.kce-mode-toggle{
  display:flex;align-items:center;
  background:#f0f2f5;border-radius:99px;
  padding:3px;gap:0;border:1px solid #e2e8f0;
}
body.dark .kce-mode-toggle{background:#0f1118;border-color:rgba(255,255,255,.1);}
.kce-mode-btn{
  padding:5px 13px;border-radius:99px;border:none;background:none;
  font-size:13px;font-weight:500;color:#718096;cursor:pointer;
  transition:all .15s;white-space:nowrap;display:flex;align-items:center;gap:5px;font-family:inherit;
}
.kce-mode-btn.kce-active{background:#fff;color:#1a202c;box-shadow:0 1px 4px rgba(0,0,0,.10);}
.kce-mode-btn.dimmed{opacity:.35;cursor:not-allowed;}
body.dark .kce-mode-btn.kce-active{background:#2d2d4a;color:#f7fafc;box-shadow:0 1px 4px rgba(0,0,0,.3);}
.kce-mode-btn .icon-solid{display:none;}
.kce-mode-btn .icon-outline{display:inline;}
.kce-mode-btn.kce-active .icon-outline{display:none;}
.kce-mode-btn.kce-active .icon-solid{display:inline;}

/* ICON BUTTONS */
.kce-icon-btn{
  width:32px;height:32px;border-radius:8px;border:1px solid #e2e8f0;
  background:#f7f8fa;color:#a0aec0;cursor:pointer;
  display:flex;align-items:center;justify-content:center;transition:all .15s;
}
.kce-icon-btn:hover,.kce-icon-btn.kce-active{border-color:#a0aec0;color:#2d3748;background:#edf2f7;}
.kce-icon-btn svg{width:14px;height:14px;}
body.dark .kce-icon-btn{background:#232338;border-color:rgba(255,255,255,.1);color:#718096;}
body.dark .kce-icon-btn:hover{background:rgba(255,255,255,.08);color:#e2e8f0;border-color:rgba(255,255,255,.2);}
#kce-btn-toggle-all svg{transition:transform .2s;}
#kce-btn-toggle-all.all-open svg{transform:rotate(180deg);}

/* LEGEND BAR */
.kce-legend{
  display:flex;align-items:center;gap:10px;padding:7px 20px;
  border-bottom:1px solid #e2e8f0;background:#fafbfc;flex-wrap:wrap;
}
body.dark .kce-legend{background:#141424;border-color:rgba(255,255,255,.08);}
.kce-legend-label{font-size:10px;font-weight:700;color:#a0aec0;text-transform:uppercase;letter-spacing:.06em;flex-shrink:0;}
.kce-legend-item{display:flex;align-items:center;gap:5px;}
.kce-legend-badge{
  font-size:10px;font-weight:700;padding:2px 9px;border-radius:99px;
  display:inline-flex;align-items:center;gap:3px;
}
.kce-legend-badge.pass {background:#dcfce7;color:#15803d;}
.kce-legend-badge.large{background:#fef9c3;color:#a16207;}
.kce-legend-badge.fail {background:#fee2e2;color:#dc2626;}
.kce-legend-desc{font-size:11px;color:#a0aec0;}
.kce-legend-sep{color:#cbd5e0;font-size:12px;}

/* GROUPS */
.kce-groups{padding:0 20px;}
.kce-group{border-bottom:1px solid #e2e8f0;}
.kce-group:last-child{border-bottom:none;}
body.dark .kce-group{border-color:rgba(255,255,255,.08);}
.kce-group-hdr{
  display:flex;align-items:center;justify-content:space-between;
  padding:13px 0;cursor:pointer;user-select:none;
}
.kce-group-hdr:hover .kce-gh-label{color:#1a202c;}
body.dark .kce-group-hdr:hover .kce-gh-label{color:#f7fafc;}
.kce-gh-left{display:flex;align-items:center;gap:10px;}
.kce-gh-folder{width:16px;height:16px;color:#a0aec0;flex-shrink:0;}
.kce-gh-label{font-size:14px;font-weight:500;color:#4a5568;transition:color .15s;}
body.dark .kce-gh-label{color:#a0aec0;}
.kce-gh-note{font-size:11.5px;color:#a0aec0;}
.kce-gh-chevron{width:15px;height:15px;color:#a0aec0;transition:transform .2s;flex-shrink:0;}
.kce-group.open .kce-gh-chevron{transform:rotate(180deg);}
.kce-group-body{display:none;padding-bottom:20px;}
.kce-group.open .kce-group-body{display:block;}

/* CONTRAST TABLE */
.kce-table-wrap{overflow-x:auto;padding-bottom:4px;margin-top:4px;}
.kce-table-wrap::-webkit-scrollbar{height:4px;}
.kce-table-wrap::-webkit-scrollbar-track{background:transparent;}
.kce-table-wrap::-webkit-scrollbar-thumb{background:#e2e8f0;border-radius:2px;}
body.dark .kce-table-wrap::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);}

.kce-table{border-collapse:separate;border-spacing:0;width:100%;min-width:500px;table-layout:fixed;}
.kce-table thead th{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:#a0aec0;padding:4px 0 10px 8px;text-align:center;vertical-align:bottom;
}
body.dark .kce-table thead th{color:#718096;}
.kce-table thead th.th-label-col{text-align:left;padding-left:0;width:110px;}

/* Row label cell — styled like column headers */
td.kce-row-label{
  padding:0 12px 8px 0;vertical-align:middle;width:110px;
}
.kce-rl-inner{display:flex;flex-direction:column;gap:2px;}
.kce-rl-name{
  font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;
  color:#a0aec0;display:block;line-height:1.3;
}
body.dark .kce-rl-name{color:#718096;}

/* Table data cell wrapper */
td.kce-td{padding:0 0 8px 8px;vertical-align:top;}

/* Contrast cell — fill column width */
.kce-cell{
  border-radius:10px;overflow:hidden;
  border:1.5px solid rgba(0,0,0,.07);
  width:100%;
}
body.dark .kce-cell{border-color:rgba(255,255,255,.07);}

.kce-swatch{
  padding:13px 14px 10px;
  min-height:68px;
  display:flex;flex-direction:column;justify-content:space-between;
}
.kce-sample{
  font-size:26px;font-weight:700;line-height:1;letter-spacing:-.01em;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
}
.kce-score-bar{
  display:flex;align-items:center;justify-content:space-between;gap:4px;
  padding:6px 10px;
  background:#fff;border-top:1px solid #f0f2f5;
}
body.dark .kce-score-bar{background:#1a1a2e;border-top-color:rgba(255,255,255,.06);}
.kce-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:10px;font-weight:700;
  padding:2px 7px;border-radius:99px;white-space:nowrap;
}
.kce-badge.pass {background:#dcfce7;color:#15803d;}
.kce-badge.large{background:#fef9c3;color:#a16207;}
.kce-badge.fail {background:#fee2e2;color:#dc2626;}
.kce-ratio{font-size:10.5px;font-weight:600;color:#a0aec0;white-space:nowrap;}
body.dark .kce-ratio{color:#718096;}

/* Cell interactivity */
.kce-cell{cursor:pointer;transition:border-color .12s,box-shadow .12s;}
.kce-cell:hover{border-color:rgba(0,0,0,.18);}
.kce-cell.kce-selected{border-color:#0097D0;box-shadow:0 0 0 2px rgba(0,151,208,.18);}
body.dark .kce-cell:hover{border-color:rgba(255,255,255,.2);}
body.dark .kce-cell.kce-selected{border-color:#19B6F1;box-shadow:0 0 0 2px rgba(25,182,241,.18);}

/* ── Popover ── */
.kce-overlay{position:fixed;inset:0;z-index:150;display:none;}
.kce-overlay.on{display:block;}
.kce-pop{
  position:fixed;width:260px;background:#fff;
  border:1px solid #e2e8f0;border-radius:16px;
  box-shadow:0 12px 40px rgba(0,0,0,.14);z-index:200;
  display:none;animation:kcePopIn .13s ease-out;overflow:hidden;
}
.kce-pop.on{display:block;}
body.dark .kce-pop{background:#1a1a2e;border-color:rgba(255,255,255,.1);box-shadow:0 12px 40px rgba(0,0,0,.5);}
@keyframes kcePopIn{from{opacity:0;transform:scale(.95) translateY(4px);}to{opacity:1;transform:scale(1) translateY(0);}}

.kce-pop-hdr{display:flex;align-items:flex-start;justify-content:space-between;padding:12px 14px 10px;gap:8px;}
.kce-pop-title{font-size:12.5px;font-weight:600;color:#1a202c;line-height:1.35;}
body.dark .kce-pop-title{color:#f7fafc;}
.kce-pop-close{
  width:22px;height:22px;border-radius:50%;border:1px solid #e2e8f0;
  background:#f7f8fa;font-size:14px;cursor:pointer;color:#718096;
  display:flex;align-items:center;justify-content:center;transition:background .1s;flex-shrink:0;
}
.kce-pop-close:hover{background:#edf2f7;}
body.dark .kce-pop-close{background:#232338;border-color:rgba(255,255,255,.1);color:#a0aec0;}
body.dark .kce-pop-close:hover{background:rgba(255,255,255,.08);}

.kce-pop-swatch{
  height:80px;margin:0 14px;border-radius:10px;
  border:1px solid rgba(0,0,0,.07);
  display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;
}
.kce-pop-aa{font-size:32px;font-weight:700;letter-spacing:-.02em;}
.kce-pop-badge{
  position:absolute;bottom:7px;right:8px;
  font-size:9.5px;font-weight:700;padding:2px 7px;border-radius:99px;
  display:flex;align-items:center;gap:4px;
}
.kce-pop-badge.pass{background:rgba(220,252,231,.9);color:#15803d;}
.kce-pop-badge.large{background:rgba(254,249,195,.9);color:#a16207;}
.kce-pop-badge.fail{background:rgba(254,226,226,.9);color:#dc2626;}

.kce-pop-body{padding:10px 14px 14px;display:flex;flex-direction:column;gap:6px;}
.kce-pop-group-lbl{
  font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.07em;
  color:#a0aec0;margin-top:4px;
}
.kce-pop-group-lbl:first-child{margin-top:0;}
body.dark .kce-pop-group-lbl{color:#718096;}
.kce-pop-divider{height:1px;background:#e2e8f0;margin:4px 0;}
body.dark .kce-pop-divider{background:rgba(255,255,255,.08);}
.kce-pop-field{display:flex;flex-direction:column;gap:3px;}
.kce-pop-field-lbl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;color:#a0aec0;}
body.dark .kce-pop-field-lbl{color:#718096;}
.kce-pop-field-row{display:flex;align-items:center;gap:6px;}
.kce-pop-val{
  flex:1;font-size:10.5px;font-family:'SF Mono','Fira Mono',monospace;color:#2d3748;
  background:#f7f8fa;border:1px solid #e2e8f0;border-radius:6px;
  padding:5px 8px;word-break:break-all;line-height:1.4;min-width:0;
}
body.dark .kce-pop-val{background:#232338;border-color:rgba(255,255,255,.1);color:#e2e8f0;}
.kce-pop-copy{
  width:26px;height:26px;border-radius:6px;border:1px solid #e2e8f0;
  background:#f7f8fa;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .1s,border-color .1s,color .1s;color:#a0aec0;position:relative;
}
.kce-pop-copy:hover{background:#edf2f7;color:#2d3748;}
.kce-pop-copy.copied{background:#c6f6d5;border-color:#9ae6b4;color:#276749;}
body.dark .kce-pop-copy{background:#232338;border-color:rgba(255,255,255,.1);}
body.dark .kce-pop-copy:hover{background:rgba(255,255,255,.08);color:#e2e8f0;}
.kce-pop-copy.copied::after{
  content:'Copied!';position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);
  background:#276749;color:#fff;font-size:9.5px;font-weight:700;
  padding:3px 8px;border-radius:5px;white-space:nowrap;z-index:10;pointer-events:none;
}
.kce-pop-copy.copied::before{
  content:'';position:absolute;bottom:calc(100% + 2px);left:50%;transform:translateX(-50%);
  border:5px solid transparent;border-top-color:#276749;z-index:10;pointer-events:none;
}
</style>
</head>
<body>
<div class="page-wrap">
  <div class="page-title">Contrast Checker</div>
  <div class="page-sub">Kaleido Design System · WCAG 2.1 AA Normal (4.5:1) · 5 brands</div>
  <div id="kce"></div>
</div>

<!-- POPOVER -->
<div class="kce-overlay" id="kce-overlay" onclick="closeKcePopover()"></div>
<div class="kce-pop" id="kce-pop">
  <div class="kce-pop-hdr">
    <span class="kce-pop-title" id="kce-pop-title"></span>
    <button class="kce-pop-close" onclick="closeKcePopover()">×</button>
  </div>
  <div class="kce-pop-swatch" id="kce-pop-swatch">
    <span class="kce-pop-aa" id="kce-pop-aa">Aa</span>
    <span class="kce-pop-badge" id="kce-pop-badge"></span>
  </div>
  <div class="kce-pop-body">
    <div class="kce-pop-group-lbl">Text</div>
    <div class="kce-pop-field">
      <span class="kce-pop-field-lbl">Token</span>
      <div class="kce-pop-field-row">
        <span class="kce-pop-val" id="kce-pop-fg-token"></span>
        <button class="kce-pop-copy" onclick="kcePopCopy('kce-pop-fg-token',this)" title="Copy token">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a2 2 0 012-2h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="kce-pop-field">
      <span class="kce-pop-field-lbl">Hex</span>
      <div class="kce-pop-field-row">
        <span class="kce-pop-val" id="kce-pop-fg-hex"></span>
        <button class="kce-pop-copy" onclick="kcePopCopy('kce-pop-fg-hex',this)" title="Copy hex">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a2 2 0 012-2h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="kce-pop-divider"></div>
    <div class="kce-pop-group-lbl">Background</div>
    <div class="kce-pop-field">
      <span class="kce-pop-field-lbl">Token</span>
      <div class="kce-pop-field-row">
        <span class="kce-pop-val" id="kce-pop-bg-token"></span>
        <button class="kce-pop-copy" onclick="kcePopCopy('kce-pop-bg-token',this)" title="Copy token">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a2 2 0 012-2h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
    <div class="kce-pop-field">
      <span class="kce-pop-field-lbl">Hex</span>
      <div class="kce-pop-field-row">
        <span class="kce-pop-val" id="kce-pop-bg-hex"></span>
        <button class="kce-pop-copy" onclick="kcePopCopy('kce-pop-bg-hex',this)" title="Copy hex">
          <svg width="12" height="12" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a2 2 0 012-2h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>
</div>

<script>
// ─── DATA ─────────────────────────────────────────────────────────────────────

const BRANDS = {
  Reliant:{ color:'#0097D0', hasDark:true  },
  DE:     { color:'#FFA440', hasDark:true  },
  GME:    { color:'#28B574', hasDark:false },
  DP:     { color:'#004C97', hasDark:false },
  Cirro:  { color:'#1AC0FF', hasDark:false },
};
const BRAND_LABELS = {
  Reliant:'Reliant', DE:'DE (Direct Energy)',
  GME:'GME (Green Mountain)', DP:'DP (Discount Power)', Cirro:'Cirro'
};
const BRAND_KEYS = ['Reliant','DE','GME','DP','Cirro'];

const NEUTRAL_VALS = {
  Reliant:{
    light:{'000':'#FFFFFF','100':'#F8F8F8','200':'#F4F4F4','300':'#F0F0F0','600':'#8C8C8C','900':'#231F20'},
    dark: {'000':'#0B242E','100':'#001B25','200':'#011117','300':'#030E12','600':'#87979E','900':'#FFFFFF'}
  },
  DE:{
    light:{'000':'#FFFFFF','100':'#FAFAFA','200':'#F6F6F6','300':'#F0F0F0','600':'#6C6C6C','900':'#000000'},
    dark: {'000':'#000028','100':'#000028','200':'#000014','300':'#6C6C80','600':'#F0F0FF','900':'#FFFFFF'}
  },
  GME:  {light:{'000':'#FFFFFF','100':'#F6F6F8','200':'#DADCDE','300':'#8C8E90','600':'#525455','900':'#525455'}},
  DP:   {light:{'000':'#FFFFFF','100':'#F2F2F2','200':'#D0D0CE','300':'#838385','600':'#4A4949','900':'#4A4949'}},
  Cirro:{light:{'000':'#FFFFFF','100':'#F9F9F9','200':'#D0D0CE','300':'#838385','600':'#000000','900':'#000000'}},
};

const BRAND_SURFACES = {
  Reliant:{
    light:{
      'Primary · Base':'#0097D0','Primary · Lightest':'#F2FBFF',
      'Secondary · Base':'#333092','Secondary · Lightest':'#F4F4F9',
      'Tertiary · Base':'#CD007A','Tertiary · Lightest':'#FEF2F9',
    },
    dark:{
      'Primary · Base':'#19B6F1','Primary · Lightest':'#094055',
      'Secondary · Base':'#8197C8','Secondary · Lightest':'#132642',
      'Tertiary · Base':'#EB2F96','Tertiary · Lightest':'#381D41',
    }
  },

// ─── STATE ────────────────────────────────────────────────────────────────────

const S = {

  allOpen:true,
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────

function effectiveMode(){ return BRANDS[S.brand].hasDark ? S.mode : 'light'; }
function getN(shade){ const m=effectiveMode(); return(NEUTRAL_VALS[S.brand][m]||NEUTRAL_VALS[S.brand].light)[shade]; }
function getT(key){ const m=effectiveMode(); return(TEXT_VALS[S.brand][m]||TEXT_VALS[S.brand].light)[key]; }
function getBrandSurfaces(){
  const m=effectiveMode();
  return BRAND_SURFACES[S.brand][m]||BRAND_SURFACES[S.brand].light;
}
function getFeedback(type,sub){
  const m=effectiveMode();
  return(FEEDBACK_VALS[type][S.brand][m]||FEEDBACK_VALS[type][S.brand].light)[sub];
}

function getLuminance(hex){
  const r=parseInt(hex.slice(1,3),16)/255;
  const g=parseInt(hex.slice(3,5),16)/255;
  const b=parseInt(hex.slice(5,7),16)/255;
  const lin=c=>c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
}
function contrastRatio(fg,bg){
  const l1=getLuminance(fg),l2=getLuminance(bg);
  const lo=Math.min(l1,l2),hi=Math.max(l1,l2);
  return(hi+0.05)/(lo+0.05);
}
function fmt(r){ return r.toFixed(1); }
function getScore(r){ return r>=4.5?'pass':r>=3.0?'large':'fail'; }
function scoreLabel(s){ return s==='pass'?'AA Pass':s==='large'?'AA Large':'Fail'; }
// Convert "Primary · Base" → "color-palette/brand-palette/primary/base"
function brandSurfaceToken(name){ return 'color-palette/brand-palette/'+name.replace(' · ','/').toLowerCase(); }

// ─── RENDER HELPERS ───────────────────────────────────────────────────────────

const COPY_ICO=`<svg width="11" height="11" viewBox="0 0 16 16" fill="none"><rect x="5" y="5" width="9" height="9" rx="2" stroke="currentColor" stroke-width="1.5"/><path d="M3 11V3a2 2 0 012-2h7" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const FOLDER_ICO=`<svg class="kce-gh-folder" viewBox="0 0 16 16" fill="none"><path d="M1.5 4a1 1 0 011-1h3.5l1.5 1.5h5.5a1 1 0 011 1V12a1 1 0 01-1 1H2.5a1 1 0 01-1-1V4z" stroke="currentColor" stroke-width="1.3"/></svg>`;
const CHEVRON_ICO=`<svg class="kce-gh-chevron" viewBox="0 0 13 13" fill="none"><path d="M2.5 4.5l3.5 4 3.5-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>`;
const EXPAND_ICO=`<svg viewBox="0 0 14 14" fill="none"><path d="M2 5l5 5 5-5M2 2h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>`;

function renderCell(bgHex,fgHex,opts={}){
  const {bgToken='',fgToken='',rowName='',colName=''}=opts;
  const r=contrastRatio(fgHex,bgHex);
  const s=getScore(r);
  return `<div class="kce-cell"
    onclick="openKcePopover(this)"
    data-bg="${bgHex}" data-fg="${fgHex}"
    data-bg-token="${bgToken}" data-fg-token="${fgToken}"
    data-row="${rowName}" data-col="${colName}"
    data-ratio="${fmt(r)}" data-score="${s}">
    <div class="kce-swatch" style="background:${bgHex}">
      <span class="kce-sample" style="color:${fgHex}">Aa</span>
    </div>
    <div class="kce-score-bar">
      <span class="kce-badge ${s}">${scoreLabel(s)}</span>
      <span class="kce-ratio">${fmt(r)}:1</span>
    </div>
  </div>`;
}

// Brand background cell: tries dark text + white text, shows whichever passes (or both, or both fail)
function renderBrandCell(bgHex){
  const darkFg=getN('900');
  const lightFg='#FFFFFF';
  const darkR=contrastRatio(darkFg,bgHex);
  const lightR=contrastRatio(lightFg,bgHex);
  const darkOk=passAA(darkR);
  const lightOk=passAA(lightR);

  if(darkOk&&lightOk){
    // Both pass — show both
    return `<div class="kce-dual-wrap">
      ${renderCellLabeled(bgHex,darkFg,'Default')}
      ${renderCellLabeled(bgHex,lightFg,'Inverse')}
    </div>`;
  } else if(darkOk){
    return renderCellLabeled(bgHex,darkFg,'Default');
  } else if(lightOk){
    return renderCellLabeled(bgHex,lightFg,'Inverse');
  } else {
    // Neither passes — show both with fail
    return `<div class="kce-dual-wrap">
      ${renderCellLabeled(bgHex,darkFg,'Default')}
      ${renderCellLabeled(bgHex,lightFg,'Inverse')}
    </div>`;
  }
}

function renderCellLabeled(bgHex,fgHex,label){
  const r=contrastRatio(fgHex,bgHex);
  const s=getScore(r);
  return `<div class="kce-${label==='Default'?'cell':'dual-cell'}">
    <div class="kce-swatch" style="background:${bgHex}">
      <span class="kce-sample" style="color:${fgHex}">Aa</span>
    </div>
    <div class="kce-score-bar">
      <span class="kce-badge ${s}">${scoreLabel(s)}</span>
      <span class="kce-ratio">${fmt(r)}:1</span>
    </div>
  </div>`;
}

function rowLabel(hex,name){
  return `<td class="kce-row-label">
    <div class="kce-rl-inner">
      <span class="kce-rl-name">${name}</span>
    </div>
  </td>`;
}

function renderNeutralSection(){
  const bg000=getN('000'),bg100=getN('100'),bg200=getN('200'),bg300=getN('300');
  const fg900=getN('900');

  // Columns = surface backgrounds
  const cols=[
    {hex:bg000,name:'Page Background',token:'color-palette/grayscale-palette/000'},
    {hex:bg100,name:'Container 100',  token:'color-palette/grayscale-palette/100'},
    {hex:bg200,name:'Container 200',  token:'color-palette/grayscale-palette/200'},
    {hex:bg300,name:'Container 300',  token:'color-palette/grayscale-palette/300'},
  ];
  // Rows = typography color tokens (semantic layer)
  const rows=[
    {hex:fg900,             name:'Header',    token:'semantic-layer/text/color/paragraph/hierarchy/default'},
    {hex:fg900,             name:'Paragraph', token:'semantic-layer/text/color/paragraph/hierarchy/default'},
    {hex:getT('secondary'), name:'Secondary', token:'semantic-layer/text/color/paragraph/hierarchy/secondary'},
    {hex:getT('legal'),     name:'Legal',     token:'semantic-layer/text/color/paragraph/hierarchy/legal'},
    {hex:getT('link'),      name:'Link',      token:'semantic-layer/text/color/link/default'},
  ];

  const thead=`<thead><tr>
    <th class="th-label-col"></th>
    ${cols.map(c=>`<th>${c.name}</th>`).join('')}
  </tr></thead>`;

  const tbody=`<tbody>${rows.map(r=>`<tr>
    ${rowLabel(r.hex,r.name)}
    ${cols.map(c=>`<td class="kce-td">${renderCell(c.hex,r.hex,{bgToken:c.token,fgToken:r.token,rowName:r.name,colName:c.name})}</td>`).join('')}
  </tr>`).join('')}</tbody>`;

  return `<div class="kce-table-wrap"><table class="kce-table">${thead}${tbody}</table></div>`;
}

// ─── SECTION: BRAND ───────────────────────────────────────────────────────────

function renderBrandSection(){
  const surfaces=getBrandSurfaces();
  const cols=Object.entries(surfaces); // [[name, hex], ...]
  const darkFg=getN('900');
  const lightFg='#FFFFFF';

  // Rows = body text options
  const rows=[
    {hex:darkFg,  name:'Default Text', token:'semantic-layer/text/color/paragraph/hierarchy/default'},
    {hex:lightFg, name:'Inverse Text', token:'color-palette/grayscale-palette/000'},
  ];

  const thead=`<thead><tr>
    <th class="th-label-col"></th>
    ${cols.map(([name])=>`<th>${name.replace(' · ','<br>')}</th>`).join('')}
  </tr></thead>`;

  const tbody=`<tbody>${rows.map(r=>`<tr>
    ${rowLabel(r.hex,r.name)}
    ${cols.map(([name,bgHex])=>`<td class="kce-td">${renderCell(bgHex,r.hex,{bgToken:brandSurfaceToken(name),fgToken:r.token,rowName:r.name,colName:name})}</td>`).join('')}
  </tr>`).join('')}</tbody>`;

  return `<div class="kce-table-wrap"><table class="kce-table">${thead}${tbody}</table></div>`;
}

// ─── SECTION: FEEDBACK ────────────────────────────────────────────────────────

function renderFeedbackSection(){
  const errPastel=getFeedback('error','pastel'),   errAcc=getFeedback('error','accessible');
  const sucPastel=getFeedback('success','pastel'), sucAcc=getFeedback('success','accessible');
  const wrnPastel=getFeedback('warning','pastel'), wrnAcc=getFeedback('warning','accessible');
  const disabledBg=getT('disabledBg'),            disabledFg=getT('disabled');
  const bodyText=getN('900');

  // Columns = feedback surface backgrounds (error / success / warning / disabled)
  const cols=[
    {hex:errPastel,  name:'Error',    feedbackFg:errAcc,     bgToken:'semantic-layer/container/color/status/error',    fgToken:'semantic-layer/text/color/feedback/error'},
    {hex:sucPastel,  name:'Success',  feedbackFg:sucAcc,     bgToken:'semantic-layer/container/color/status/success',  fgToken:'semantic-layer/text/color/feedback/success'},
    {hex:wrnPastel,  name:'Warning',  feedbackFg:wrnAcc,     bgToken:'semantic-layer/container/color/status/warning',  fgToken:'semantic-layer/text/color/feedback/warning'},
    {hex:disabledBg, name:'Disabled', feedbackFg:disabledFg, bgToken:'semantic-layer/container/color/status/disabled', fgToken:'semantic-layer/text/color/paragraph/feedback/disabled'},
  ];
  const bodyToken='semantic-layer/text/color/paragraph/hierarchy/default';

  const thead=`<thead><tr>
    <th class="th-label-col"></th>
    ${cols.map(c=>`<th>${c.name}</th>`).join('')}
  </tr></thead>`;

  const bodyRow=`<tr>
    ${rowLabel(bodyText,'Body Text')}
    ${cols.map(c=>`<td class="kce-td">${renderCell(c.hex,bodyText,{bgToken:c.bgToken,fgToken:bodyToken,rowName:'Body Text',colName:c.name})}</td>`).join('')}
  </tr>`;

  // State text — label only (no sub), token varies per column
  const fbRow=`<tr>
    <td class="kce-row-label"><div class="kce-rl-inner"><span class="kce-rl-name">State Text</span></div></td>
    ${cols.map(c=>`<td class="kce-td">${renderCell(c.hex,c.feedbackFg,{bgToken:c.bgToken,fgToken:c.fgToken,rowName:'State Text',colName:c.name})}</td>`).join('')}
  </tr>`;

  const tbody=`<tbody>${bodyRow}${fbRow}</tbody>`;
  return `<div class="kce-table-wrap"><table class="kce-table">${thead}${tbody}</table></div>`;
}

// ─── ACTIONS ──────────────────────────────────────────────────────────────────

function kceDD(which){
  const id='kce-menu-'+which;
  const menu=document.getElementById(id);
  if(!menu) return;
  const isOpen=menu.classList.contains('open');
  document.querySelectorAll('.kce-dd-menu.open').forEach(m=>m.classList.remove('open'));
  if(!isOpen) menu.classList.add('open');
}

function setBrand(brand){
  S.brand=brand;
  if(!BRANDS[brand].hasDark) S.mode='light';
  render();
}

function setMode(mode){
  S.mode=mode;
  render();
}

function toggleGroup(key){
  S.groups[key]=!S.groups[key];
  const grp=document.getElementById('kce-grp-'+key);
  if(grp) grp.classList.toggle('open',S.groups[key]);
  const anyOpen=Object.values(S.groups).some(Boolean);
  S.allOpen=anyOpen;
  const btn=document.getElementById('kce-btn-toggle-all');
  if(btn) btn.classList.toggle('all-open',anyOpen);
}

function kceToggleAll(){
  const target=!S.allOpen;
  Object.keys(S.groups).forEach(k=>S.groups[k]=target);
  S.allOpen=target;
  document.querySelectorAll('.kce-group').forEach(g=>g.classList.toggle('open',target));
  const btn=document.getElementById('kce-btn-toggle-all');
  if(btn) btn.classList.toggle('all-open',target);
}

// Close dropdowns on outside click
document.addEventListener('click',e=>{
  if(!e.target.closest('.kce-dd')) document.querySelectorAll('.kce-dd-menu.open').forEach(m=>m.classList.remove('open'));
});

// ─── POPOVER ──────────────────────────────────────────────────────────────────

let _kceActiveCell = null;

function openKcePopover(el){
  if(_kceActiveCell) _kceActiveCell.classList.remove('kce-selected');
  _kceActiveCell = el;
  el.classList.add('kce-selected');

  const bg=el.dataset.bg, fg=el.dataset.fg;
  const bgToken=el.dataset.bgToken, fgToken=el.dataset.fgToken;
  const rowName=el.dataset.row, colName=el.dataset.col;
  const ratio=el.dataset.ratio, score=el.dataset.score;

  // Title
  document.getElementById('kce-pop-title').textContent = rowName + ' on ' + colName;

  // Swatch
  const sw=document.getElementById('kce-pop-swatch');
  sw.style.background=bg;
  const aa=document.getElementById('kce-pop-aa');
  aa.style.color=fg;
  const badge=document.getElementById('kce-pop-badge');
  badge.className='kce-pop-badge '+score;
  badge.textContent=scoreLabel(score)+' · '+ratio+':1';

  // Text fields
  document.getElementById('kce-pop-fg-token').textContent=fgToken||'—';
  document.getElementById('kce-pop-fg-hex').textContent=fg;

  // Background fields
  document.getElementById('kce-pop-bg-token').textContent=bgToken||'—';
  document.getElementById('kce-pop-bg-hex').textContent=bg;

  // Position
  const pop=document.getElementById('kce-pop'), ov=document.getElementById('kce-overlay');
  pop.classList.remove('on'); ov.classList.add('on');
  const rect=el.getBoundingClientRect();
  const pw=260, ph=360;
  let left=rect.right+12, top=rect.top;
  if(left+pw>window.innerWidth-12) left=rect.left-pw-12;
  if(left<12) left=Math.min(rect.left, window.innerWidth-pw-12);
  if(top+ph>window.innerHeight-12) top=window.innerHeight-ph-12;
  if(top<12) top=12;
  pop.style.left=left+'px'; pop.style.top=top+'px';
  requestAnimationFrame(()=>pop.classList.add('on'));
}

function closeKcePopover(){
  document.getElementById('kce-pop').classList.remove('on');
  document.getElementById('kce-overlay').classList.remove('on');
  if(_kceActiveCell){ _kceActiveCell.classList.remove('kce-selected'); _kceActiveCell=null; }
}

function kcePopCopy(elId, btn){
  const text=document.getElementById(elId).textContent;
  (navigator.clipboard?navigator.clipboard.writeText(text):Promise.reject())
    .catch(()=>{ const t=document.createElement('textarea'); t.value=text; document.body.appendChild(t); t.select(); document.execCommand('copy'); document.body.removeChild(t); });
  btn.classList.add('copied');
  setTimeout(()=>btn.classList.remove('copied'),1300);
}


// ─── INIT ─────────────────────────────────────────────────────────────────────

render();
</script>
